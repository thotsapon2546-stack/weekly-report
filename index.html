<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบส่งรายงานการทำงานพนักงาน (ทุกสาขา)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-submit { background-color: #198754; border: none; font-weight: bold; }
        .btn-submit:hover { background-color: #146c43; }
    </style>
</head>
<body class="py-5">
<div class="container" style="max-width: 600px;">
    <div class="card p-4 bg-white">
        <h3 class="fw-bold mb-4 text-success text-center">📥 ระบบส่งรายงานการทำงาน (รวมทุกสำนักงาน)</h3>
        <form id="reportForm">
            <div class="mb-3">
                <label class="form-label fw-semibold">ชื่อ-นามสกุล</label>
                <input type="text" class="form-control" id="staff_name" placeholder="กรอกชื่อ-นามสกุลพนักงาน" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">วันที่</label>
                <input type="date" class="form-control" id="report_date" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">หัวข้อรายงาน</label>
                <input type="text" class="form-control" id="title" placeholder="ระบุหัวข้อรายงาน" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">รายละเอียดงาน</label>
                <textarea class="form-control" id="detail" rows="6" placeholder="ระบุรายละเอียดงานที่ทำ..." required></textarea>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-success w-100 btn-submit py-2.5 mt-2">ส่งข้อมูลเข้าฐานข้อมูล NAS</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('reportForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = 'กำลังส่งข้อมูลข้ามสาขาไปยัง NAS...';
        
        const payload = {
            staff_name: document.getElementById('staff_name').value,
            report_date: document.getElementById('report_date').value,
            title: document.getElementById('title').value,
            detail: document.getElementById('detail').value
        };

        // 🌟 อัปเดตเป้าหมายชี้ไปที่ IP สาธารณะตัวจริงของคุณทศพลเรียบร้อยแล้วครับ 🌟
        const targetUrl = 'http://223.27.212.187/weekly-report/api.php';

        fetch(targetUrl, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(res => {
            if (!res.ok) throw new Error('HTTP error ' + res.status);
            return res.json();
        })
        .then(data => {
            if(data.status === 'success') {
                alert('🎉 สำเร็จ! บันทึกข้อมูลส่งรายงานเข้าฐานข้อมูลเครื่อง NAS เรียบร้อยแล้ว');
                document.getElementById('reportForm').reset();
            } else {
                alert('❌ เกิดข้อผิดพลาดจากระบบหลังบ้าน: ' + data.message);
            }
        })
        .catch(err => {
            console.error(err);
            // ข้อความแจ้งเตือนที่ระบุตำแหน่ง IP ล่าสุดให้ชัดเจน เพื่อใช้ในการตรวจสอบเชิงเทคนิค
            alert('❌ ไม่สามารถเชื่อมต่อฐานข้อมูลเครื่อง NAS ได้\n\n[ข้อมูลการตรวจสอบ]\n1. ปลายทางปัจจุบัน: ' + targetUrl + '\n2. กรุณาตรวจสอบว่าได้ตั้งค่า Port Forwarding ที่เร้าเตอร์แล้วหรือยัง\n3. หากเบราว์เซอร์บล็อกความปลอดภัย ให้กดปุ่มแม่กุญแจหน้า URL แล้วเลือก "อนุญาตเนื้อหาที่ไม่ปลอดภัย" (Allow Insecure Content)');
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = 'ส่งข้อมูลเข้าฐานข้อมูล NAS';
        });
    });
</script>
</body>
</html>
