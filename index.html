<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบส่งรายงานพนักงาน (GitHub Domain)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .card { border-radius: 15px; }
    </style>
</head>
<body class="py-5">
<div class="container" style="max-width: 600px;">
    <div class="card p-4 shadow-sm border-0">
        <h3 class="fw-bold mb-4 text-success text-center">📥 ส่งรายงานการทำงาน (GitHub -> QNAP)</h3>
        <form id="reportForm">
            <div class="mb-3">
                <label class="form-label fw-semibold">ชื่อ-นามสกุล</label>
                <input type="text" class="form-control" id="staff_name" placeholder="กรอกชื่อ-นามสกุลพนักงาน" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">วันที่</label>
                <input type="date" class="form-control" id="report_date" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">หัวข้อรายงาน</label>
                <input type="text" class="form-control" id="title" placeholder="เช่น รายงานความคืบหน้าโปรเจกต์ประจำสัปดาห์" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">รายละเอียดงาน</label>
                <textarea class="form-control" id="detail" rows="5" placeholder="ระบุรายละเอียดงานที่ทำ..." required></textarea>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-success w-100 fw-bold py-2 mt-2">ส่งข้อมูลเข้าฐานข้อมูล NAS</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('reportForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = 'กำลังส่งข้อมูล...';
        
        const payload = {
            staff_name: document.getElementById('staff_name').value,
            report_date: document.getElementById('report_date').value,
            title: document.getElementById('title').value,
            detail: document.getElementById('detail').value
        };

        // ⚠️ ขั้นตอนสำคัญ: ให้เปลี่ยน URL ตรงนี้ตามที่กำหนดในขั้นตอนการตั้งค่าด้านล่าง
        const targetUrl = 'https://ชื่อโดมินของคุณ.myqnapcloud.com:พอร์ตHTTPS/weekly-report/api.php';

        fetch(targetUrl, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(res => {
            if (!res.ok) {
                throw new Error('Network response was not ok: ' + res.status);
            }
            return res.json();
        })
        .then(data => {
            if(data.status === 'success') {
                alert('🎉 บันทึกข้อมูลเข้า phpMyAdmin เรียบร้อย!');
                document.getElementById('reportForm').reset();
            } else {
                alert('เซิร์ฟเวอร์ตอบกลับข้อผิดพลาด: ' + data.message);
            }
        })
        .catch(err => {
            console.error('Error detail:', err);
            alert('❌ ไม่สามารถเชื่อมต่อเครื่องเซิร์ฟเวอร์ NAS ได้\nกรุณาตรวจสอบการตั้งค่า HTTPS, Port Forwarding หรือดูรายละเอียด Error ใน Console (F1)');
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = 'ส่งข้อมูลเข้าฐานข้อมูล NAS';
        });
    });
</script>
</body>
</html>
