<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบส่งรายงานพนักงาน (GitHub Domain)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-4">
<div class="container" style="max-width: 600px;">
    <div class="card p-4 shadow-sm border-0">
        <h3 class="fw-bold mb-4 text-success">📥 ส่งรายงานการทำงาน (GitHub -> QNAP)</h3>
        <form id="reportForm">
            <div class="mb-3">
                <label class="form-label fw-semibold">ชื่อ-นามสกุล</label>
                <input type="text" class="form-control" id="staff_name" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">วันที่</label>
                <input type="date" class="form-control" id="report_date" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">หัวข้อรายงาน</label>
                <input type="text" class="form-control" id="title" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">รายละเอียดงาน</label>
                <textarea class="form-control" id="detail" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold py-2">ส่งข้อมูลเข้าฐานข้อมูล NAS</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('reportForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const payload = {
            staff_name: document.getElementById('staff_name').value,
            report_date: document.getElementById('report_date').value,
            title: document.getElementById('title').value,
            detail: document.getElementById('detail').value
        };

        // ใช้ CloudLink ทะลุเข้ามาหาไฟล์ api.php บนตัว NAS โดยตรง (เปลี่ยน zns123 เป็นชื่อในภาพหลอดไฟของคุณ)
        fetch('https://qlink.to/zns123/weekly-report/api.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                alert('🎉 บันทึกข้อมูลเข้า phpMyAdmin บน NAS เรียบร้อย!');
                document.getElementById('reportForm').reset();
            } else {
                alert('เกิดข้อผิดพลาดในการบันทึก: ' + data.message);
            }
        })
        .catch(err => {
            console.error('Error:', err);
            alert('ไม่สามารถเชื่อมต่อเครื่องเซิร์ฟเวอร์ NAS ได้');
        });
    });
</script>
</body>
</html>
